<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainSmith Test Reports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 2rem; }
    h1 { color: #58a6ff; margin-bottom: 0.5rem; }
    .subtitle { color: #8b949e; margin-bottom: 2rem; }
    .chain-group { margin-bottom: 2rem; }
    .chain-name { color: #f0883e; font-size: 1.2rem; margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #21262d; }
    .report-list { list-style: none; }
    .report-list li { padding: 0.5rem 0; border-bottom: 1px solid #21262d; }
    .report-list a { color: #58a6ff; text-decoration: none; }
    .report-list a:hover { text-decoration: underline; }
    .badge { display: inline-block; background: #1f6feb; color: #fff; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.75rem; margin-left: 0.5rem; }
    .timestamp { color: #8b949e; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>📊 ChainSmith Test Reports</h1>
  <p class="subtitle">Auto-generated by CI pipeline</p>
</body>
</html>
