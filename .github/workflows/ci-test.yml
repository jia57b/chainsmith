name: ChainSmith CI Tests

on:
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests on 0G Localnet
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── Setup ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── 0G Localnet ────────────────────────────────────────
      - name: Pull 0G Docker images
        working-directory: chains/0g-docker
        run: |
          DOCKER_DEFAULT_PLATFORM=linux/amd64 docker pull ghcr.io/emberstake/0g-docker/node:v2.0.4
          DOCKER_DEFAULT_PLATFORM=linux/amd64 docker pull ghcr.io/emberstake/0g-docker/geth:v2.0.4

      - name: Initialize multinode localnet
        working-directory: chains/0g-docker
        run: |
          chmod +x init-multinode.sh
          ./init-multinode.sh

      - name: Start localnet
        working-directory: chains/0g-docker
        run: |
          docker compose -f docker-compose.multinode.yml up -d
          echo "Waiting 10s for containers to start..."
          sleep 10
          docker compose -f docker-compose.multinode.yml ps

      - name: Wait for chain readiness
        timeout-minutes: 5
        run: |
          echo "Waiting for 0G chain to produce blocks..."
          MAX_ATTEMPTS=60
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HEIGHT=$(curl -s http://localhost:26657/status 2>/dev/null | jq -r '.result.sync_info.latest_block_height // "0"' 2>/dev/null || echo "0")
            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS: block height = $HEIGHT"
            if [ "$HEIGHT" -gt 2 ] 2>/dev/null; then
              echo "✅ Chain is producing blocks (height: $HEIGHT)"
              # Verify validators
              VALIDATORS=$(curl -s http://localhost:26657/validators | jq '.result.validators | length' 2>/dev/null || echo "0")
              echo "✅ Active validators: $VALIDATORS"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Chain failed to produce blocks within timeout"
          docker compose -f chains/0g-docker/docker-compose.multinode.yml logs --tail=50
          exit 1

