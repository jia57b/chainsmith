name: ChainSmith CI Tests for Avalanche

on:
    workflow_dispatch:
        inputs:
            test_profile:
                description: 'Which Avalanche tests to run'
                required: true
                default: full
                type: choice
                options:
                    - smoke
                    - extended
                    - full

permissions:
    contents: read

concurrency:
    group: avalanche-self-hosted-serial
    cancel-in-progress: false

jobs:
    avalanche-self-hosted:
        name: Avalanche Tests (${{ inputs.test_profile || 'full' }})
        runs-on:
            - self-hosted
            - linux
            - x64
        timeout-minutes: 90
        env:
            CHAIN_ENV: avalanche-local
            AVALANCHE_CHAIN_NAME: chainsmithavalanche

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate self-hosted prerequisites
              shell: bash
              run: |
                  set -euo pipefail
                  source chains/avalanche-cli-local/common.sh
                  CLI_BIN="$(resolve_avalanche_cli)"
                  AVALANCHEGO_BIN="$(resolve_avalanchego_bin)"
                  SIG_AGG_BIN="$(resolve_signature_aggregator_bin)"
                  echo "AVALANCHE_CLI_BIN=${CLI_BIN}" >> "${GITHUB_ENV}"
                  echo "AVALANCHEGO_BIN=${AVALANCHEGO_BIN}" >> "${GITHUB_ENV}"
                  echo "SIGNATURE_AGGREGATOR_BIN=${SIG_AGG_BIN}" >> "${GITHUB_ENV}"
                  echo "✅ Avalanche CLI: ${CLI_BIN}"
                  echo "✅ AvalancheGo: ${AVALANCHEGO_BIN}"
                  echo "✅ Signature Aggregator: ${SIG_AGG_BIN}"

            - name: Bootstrap Avalanche definition if missing
              shell: bash
              run: |
                  set -euo pipefail
                  if [ ! -d "${HOME}/.avalanche-cli/subnets/${AVALANCHE_CHAIN_NAME}" ]; then
                    echo "ℹ️ Avalanche definition not found; bootstrapping it once on the self-hosted runner."
                    chmod +x chains/avalanche-cli-local/bootstrap-avalanche-definition.sh
                    chains/avalanche-cli-local/bootstrap-avalanche-definition.sh --force
                  else
                    echo "✅ Reusing existing Avalanche definition at ~/.avalanche-cli/subnets/${AVALANCHE_CHAIN_NAME}"
                  fi

            - name: Reset prior Avalanche runtime state
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x chains/avalanche-cli-local/stop-multinode.sh
                  chains/avalanche-cli-local/stop-multinode.sh clean || true

            - name: Start Avalanche localnet
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x chains/avalanche-cli-local/start-multinode.sh
                  chains/avalanche-cli-local/start-multinode.sh

            - name: Verify Avalanche environment
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x chains/avalanche-cli-local/check-environment.sh
                  chains/avalanche-cli-local/check-environment.sh

            - name: Refresh Avalanche test config
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x chains/avalanche-cli-local/refresh-config.sh
                  chains/avalanche-cli-local/refresh-config.sh

            - name: Generate load stress config
              shell: bash
              run: |
                  set -euo pipefail
                  cp tests/load-stress.config.example.json tests/load-stress.config.json

            - name: Generate .env
              shell: bash
              run: |
                  set -euo pipefail
                  printf 'CHAIN_ENV=%s\n' "${CHAIN_ENV}" > .env

            - name: Run Avalanche platform smoke test
              if: inputs.test_profile == 'smoke' || inputs.test_profile == 'full'
              run: pnpm test:avalanche:platform

            - name: Run basic smoke test
              if: inputs.test_profile == 'smoke' || inputs.test_profile == 'full'
              run: pnpm test:basic

            - name: Run EVM RPC smoke test
              if: inputs.test_profile == 'smoke' || inputs.test_profile == 'full'
              run: pnpm test:rpc:evm

            - name: Run PoA lifecycle test
              if: inputs.test_profile == 'extended' || inputs.test_profile == 'full'
              run: pnpm test:avalanche:lifecycle:poa

            - name: Run performance test
              if: inputs.test_profile == 'extended' || inputs.test_profile == 'full'
              run: pnpm test:performance

            - name: Run load stress test
              if: inputs.test_profile == 'extended' || inputs.test_profile == 'full'
              run: pnpm test:load:stress

            - name: Merge test reports
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x scripts/merge-reports.sh
                  bash scripts/merge-reports.sh

            - name: Collect Avalanche debug artifacts
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p artifacts/avalanche
                  cp -R chains/avalanche-cli-local/output artifacts/avalanche/script-output 2>/dev/null || true
                  cp -R ~/.avalanche-cli/logs artifacts/avalanche/cli-logs 2>/dev/null || true
                  cp -R ~/.avalanche-cli/runs/LocalNetwork artifacts/avalanche/localnetwork 2>/dev/null || true
                  cp -R ~/.avalanche-cli/local/chainsmithavalanche-local-node-local-network artifacts/avalanche/local-cluster 2>/dev/null || true
                  cp tests/config.avalanche.local.generated.json artifacts/avalanche/config.avalanche.local.generated.json 2>/dev/null || true

            - name: Upload merged report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: avalanche-self-hosted-report
                  path: tests/test-report/merged/
                  retention-days: 14

            - name: Upload Avalanche debug artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: avalanche-self-hosted-debug
                  path: artifacts/avalanche/
                  retention-days: 14

            - name: Stop Avalanche localnet
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x chains/avalanche-cli-local/stop-multinode.sh
                  chains/avalanche-cli-local/stop-multinode.sh clean || true

    deploy-report:
        name: Deploy Avalanche Report to GitHub Pages
        needs: avalanche-self-hosted
        runs-on: ubuntu-latest
        concurrency:
            group: deploy-pages
            cancel-in-progress: false
        permissions:
            contents: write
        env:
            CHAIN_ENV: avalanche-local
            TEST_PROFILE: ${{ inputs.test_profile || 'full' }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download test report artifact
              uses: actions/download-artifact@v4
              with:
                  name: avalanche-self-hosted-report
                  path: ./report

            - name: Deploy to gh-pages branch
              shell: bash
              run: |
                  set -euo pipefail
                  REPORT_DIR="${CHAIN_ENV}/${{ github.run_id }}"
                  MAX_REPORTS=20

                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"

                  git clone --branch gh-pages --single-branch \
                    "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
                    gh-pages 2>/dev/null || {
                    mkdir gh-pages
                    cd gh-pages
                    git init
                    git checkout -b gh-pages
                    git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
                    cd ..
                  }

                  mkdir -p "gh-pages/${REPORT_DIR}"
                  cp -r ./report/* "gh-pages/${REPORT_DIR}/"
                  echo "$(date -u '+%Y-%m-%d %H:%M')" > "gh-pages/${REPORT_DIR}/timestamp.txt"
                  echo "${TEST_PROFILE}" > "gh-pages/${REPORT_DIR}/profile.txt"
                  echo "✅ Report copied to ${REPORT_DIR}/"

                  cd gh-pages
                  if [ -d "${CHAIN_ENV}" ]; then
                    REPORT_COUNT=$(ls -1d ${CHAIN_ENV}/*/ 2>/dev/null | wc -l)
                    if [ "${REPORT_COUNT}" -gt "${MAX_REPORTS}" ]; then
                      REMOVE_COUNT=$((REPORT_COUNT - MAX_REPORTS))
                      ls -1d ${CHAIN_ENV}/*/ | head -n "${REMOVE_COUNT}" | while read -r dir; do
                        echo "🗑️  Removing old report: ${dir}"
                        rm -rf "${dir}"
                      done
                    fi
                  fi

                  echo "📑 Generating test report index..."
                  chmod +x "$GITHUB_WORKSPACE/scripts/generate-report-index.sh"
                  bash "$GITHUB_WORKSPACE/scripts/generate-report-index.sh"

                  git add -A
                  git commit -m "Deploy Avalanche self-hosted report: ${CHAIN_ENV}/#${{ github.run_id }}" || echo "No changes to commit"
                  git push origin gh-pages

                  REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
                  PAGES_BASE="https://${{ github.repository_owner }}.github.io/${REPO_NAME}"
                  REPORT_URL="${PAGES_BASE}/${REPORT_DIR}/"
                  INDEX_URL="${PAGES_BASE}/"

                  echo "## 📊 Avalanche Report Deployed" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "| | |" >> "$GITHUB_STEP_SUMMARY"
                  echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Chain** | \`${CHAIN_ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Profile** | \`${TEST_PROFILE}\` |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Run ID** | \`${{ github.run_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Report** | [${REPORT_DIR}](${REPORT_URL}) |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Index** | [View All Reports](${INDEX_URL}) |" >> "$GITHUB_STEP_SUMMARY"
