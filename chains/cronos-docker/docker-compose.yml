# docker-compose.yml
# Cronos 4-Validator Localnet for ChainSmith Testing
#
# Architecture: Each validator = 1 cronosd container (CometBFT + EVM in same process)
#
# Usage:
#   1. Init: ./init-multinode.sh
#   2. Start: ./start-multinode.sh
#   3. Check: docker compose --env-file .env.multinode -f docker-compose.yml ps
#   4. Logs:  docker compose --env-file .env.multinode -f docker-compose.yml logs -f cronos-validator1
#   5. Stop:  ./stop-multinode.sh

services:
    cronos-validator1:
        image: ${CRONOS_IMAGE:-chainsmith/cronosd:local}
        entrypoint: ['cronosd']
        restart: unless-stopped
        user: root
        networks:
            cronos-multi:
        env_file:
            - .env.multinode
        logging:
            options:
                max-size: '12m'
                max-file: '5'
        command: >
            start
            --home /root/.cronos
            --chain-id cronos_777-1
            --p2p.laddr "tcp://0.0.0.0:26656"
            --p2p.persistent_peers "${PERSISTENT_PEERS}"
            --rpc.laddr "tcp://0.0.0.0:26657"
            --rpc.unsafe
            --api.enable
            --json-rpc.api "eth,txpool,personal,net,debug,web3"
            --minimum-gas-prices "0basetcro"
            --pruning nothing
            --log_level ${LOG_LEVEL:-info}
        volumes:
            - type: volume
              source: cronos_validator1_home
              target: /root/.cronos
        ports:
            - '26657:26657'
            - '1317:1317'
            - '8545:8545'
            - '8546:8546'
            - '9090:9090'
            - '26656:26656'

