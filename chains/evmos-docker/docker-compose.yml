# docker-compose.yml
# Evmos 4-Validator Localnet for ChainSmith Testing
#
# Architecture: Each validator = 1 evmos container (CometBFT + EVM in same process)
#
# Usage:
#   1. Init: ./init-multinode.sh
#   2. Start: ./start-multinode.sh
#   3. Check: docker compose --env-file .env.multinode -f docker-compose.yml ps
#   4. Logs:  docker compose --env-file .env.multinode -f docker-compose.yml logs -f evmos-validator1
#   5. Stop:  ./stop-multinode.sh

services:
    # ============ Validator 1 ============
    evmos-validator1:
        image: tharsishq/evmos:${EVMOS_TAG:-v20.0.0}
        entrypoint: ['evmosd']
        restart: unless-stopped
        user: root
        networks:
            evmos-multi:
        env_file:
            - .env.multinode
        logging:
            options:
                max-size: '12m'
                max-file: '5'
        command: >
            start
            --home /root/.evmosd
            --chain-id evmos_9002-1
            --p2p.laddr "tcp://0.0.0.0:26656"
            --p2p.persistent_peers "${PERSISTENT_PEERS}"
            --rpc.laddr "tcp://0.0.0.0:26657"
            --minimum-gas-prices "0.0001aevmos"
            --json-rpc.api "eth,txpool,personal,net,debug,web3"
            --pruning nothing
            --log_level ${LOG_LEVEL:-info}
        volumes:
            - type: volume
              source: evmos_validator1_home
              target: /root/.evmosd
        ports:
            - '26657:26657' # CometBFT RPC
            - '1317:1317' # Cosmos REST API
            - '8545:8545' # EVM JSON-RPC
            - '8546:8546' # EVM WebSocket
            - '9090:9090' # gRPC
            - '26656:26656' # P2P

    # ============ Validator 2 ============
