# docker-compose.multinode.yml
# Kava 4-Validator Localnet for ChainSmith Testing
#
# Architecture: Each validator = 1 kava container (consensus + EVM in same process)
# Unlike 0G/Story, Kava does NOT need separate geth containers.
#
# Usage:
#   1. Init: ./init-multinode.sh
#   2. Start: ./start-multinode.sh (or: docker compose -f docker-compose.multinode.yml up -d)
#   3. Check: docker compose -f docker-compose.multinode.yml ps
#   4. Logs:  docker compose -f docker-compose.multinode.yml logs -f kava-validator1
#   5. Stop:  ./stop-multinode.sh

services:
    # ============ Validator 1 ============
    kava-validator1:
        image: kava/kava:${KAVA_TAG:-v0.28.2-goleveldb}
        restart: unless-stopped
        networks:
            kava-multi:
        env_file:
            - .env.multinode
        logging:
            options:
                max-size: '12m'
                max-file: '5'
        command: >
            kava start
            --home /root/.kava
            --p2p.laddr "tcp://0.0.0.0:26656"
            --p2p.persistent_peers "${PERSISTENT_PEERS}"
            --rpc.laddr "tcp://0.0.0.0:26657"
            --minimum-gas-prices "0.001ukava"
            --pruning nothing
            --log_level ${LOG_LEVEL:-info}
        volumes:
            - type: volume
              source: kava_validator1_home
              target: /root/.kava
        ports:
            - '26657:26657' # CometBFT RPC
            - '1317:1317' # Cosmos REST API
            - '8545:8545' # EVM JSON-RPC
            - '8546:8546' # EVM WebSocket
            - '9090:9090' # gRPC
            - '26656:26656' # P2P

    # ============ Validator 2 ============
