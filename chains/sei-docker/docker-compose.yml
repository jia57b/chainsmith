            --rpc.laddr "tcp://0.0.0.0:26657"
            --minimum-gas-prices "0.01usei"
            --pruning nothing
            --log_level ${LOG_LEVEL:-info}
            --chain-id sei
        volumes:
            - type: volume
              source: sei_validator2_home
              target: /root/.sei
        ports:
            - '36657:26657' # CometBFT RPC
            - '21317:1317' # Cosmos REST API
            - '28545:8545' # EVM JSON-RPC
            - '36656:26656' # P2P

    # ============ Validator 3 ============
    sei-validator3:
        image: sei-chain:${SEI_TAG:-local}
