# docker-compose.yml
# Sei 4-Validator Localnet for ChainSmith Testing
#
# Architecture: Each validator = 1 seid container (CometBFT consensus + Parallelized EVM in same process)
# Sei V2 has built-in EVM support (NOT Ethermint-based), so no separate geth containers needed.
#
# Usage:
#   1. Init: ./init-multinode.sh
#   2. Start: ./start-multinode.sh (or: docker compose --env-file .env.multinode -f docker-compose.yml up -d)
#   3. Check: docker compose --env-file .env.multinode -f docker-compose.yml ps
#   4. Logs:  docker compose --env-file .env.multinode -f docker-compose.yml logs -f sei-validator1
#   5. Stop:  ./stop-multinode.sh

services:
    # ============ Validator 1 ============
    sei-validator1:
        image: sei-chain:${SEI_TAG:-local}
        pull_policy: never
        restart: unless-stopped
        networks:
            sei-multi:
        env_file:
            - .env.multinode
        logging:
            options:
                max-size: '12m'
                max-file: '5'
        entrypoint: ['seid']
        command: >
            start
            --home /root/.sei
            --p2p.laddr "tcp://0.0.0.0:26656"
            --rpc.laddr "tcp://0.0.0.0:26657"
            --minimum-gas-prices "0.01usei"
            --pruning nothing
            --log_level ${LOG_LEVEL:-info}
            --chain-id sei
        volumes:
            - type: volume
              source: sei_validator1_home
              target: /root/.sei
        ports:
            - '26657:26657' # CometBFT RPC
            - '1317:1317' # Cosmos REST API
            - '8545:8545' # EVM JSON-RPC
            - '8546:8546' # EVM WebSocket
            - '9090:9090' # gRPC
            - '26656:26656' # P2P

    # ============ Validator 2 ============
