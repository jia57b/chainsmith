        ports:
            - '46657:26657' # CometBFT RPC
            - '31317:1317' # Cosmos REST API
            - '38545:8545' # EVM JSON-RPC
            - '46656:26656' # P2P

    # ============ Validator 4 ============
    sei-validator4:
        image: sei-chain:${SEI_TAG:-local}
