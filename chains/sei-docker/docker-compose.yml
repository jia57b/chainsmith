    sei_validator1_home:
        external: true
        name: sei_validator1_home
    sei_validator2_home:
        external: true
        name: sei_validator2_home
    sei_validator3_home:
        external: true
        name: sei_validator3_home
    sei_validator4_home:
        external: true
        name: sei_validator4_home

networks:
    sei-multi:
